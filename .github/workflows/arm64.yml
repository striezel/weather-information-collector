name: ARM 64

on: push

jobs:
  package:
    runs-on: ubuntu-22.04
    steps:
      # Checks-out the repository under $GITHUB_WORKSPACE.
      - name: Checkout
        uses: actions/checkout@v3
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v2
      - name: Inspect builder
        run: |
          echo "Name:      ${{ steps.buildx.outputs.name }}"
          echo "Endpoint:  ${{ steps.buildx.outputs.endpoint }}"
          echo "Status:    ${{ steps.buildx.outputs.status }}"
          echo "Flags:     ${{ steps.buildx.outputs.flags }}"
          echo "Platforms: ${{ steps.buildx.outputs.platforms }}"
      - name: Build
        run: |
          mkdir pkg
          cd pkg
          cp "$GITHUB_WORKSPACE"/docker/Dockerfile_package ./Dockerfile
          docker buildx build --platform=linux/arm64 . --tag package:arm64
      - name: Extract package from Docker image
        run: |
          cd "$GITHUB_WORKSPACE"
          mkdir -p "$GITHUB_WORKSPACE"/artifacts
          TAG="${CI_COMMIT_TAG:-$(git describe | cut -d '-' -f 1)}"
          VERSION=$(echo $TAG | cut -c '2-')
          RELEASE=bullseye
          docker buildx create --platform=linux/arm64 --name=pkg_container package:arm64
          docker cp pkg_container:/opt/weather-information-collector_${VERSION}-${RELEASE}_arm64.deb "$GITHUB_WORKSPACE"/artifacts/
          docker buildx rm pkg_container
      - name: Archive build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: package-arm64-debian
          path: |
            artifacts/*
